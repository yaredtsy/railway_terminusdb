events {
    worker_connections 1024;
}

http {
    # Ensure large uploads don't get blocked by Nginx size limits
    client_max_body_size 0; 
    
    server {
        # Railway dynamically sets the PORT environment variable, 
        # but in a standard Nginx Docker image we listen on a fixed port and let Railway map it.
        listen 80;
        
        # DNS resolver for Railway internal network
        resolver 127.0.0.11 valid=30s;

        location / {
            # Disable buffering to allow streaming large files directly to TerminusDB
            # This fixes the out-of-memory/large file issue you had in Bun
            proxy_request_buffering off;
            proxy_buffering off;
            
            # Forward necessary headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https; # Force HTTPS for downstream awareness

            # Target TerminusDB internal URL
            set $upstream http://terminusdb.railway.internal:6363;
            proxy_pass $upstream;

            # --- LOCATION HEADER REWRITE ---
            # This mimics your Bun script's location URL replacement. 
            # It catches any 'http://' redirect from TerminusDB and forces it to 'https://' 
            # using the public host that hit Nginx.
            proxy_redirect ~^http://[^/]+/(.*)$ https://$host/$1;

            # --- CORS HEADERS ---
            # Handle OPTIONS requests (Preflight)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS, HEAD' always;
                add_header 'Access-Control-Allow-Headers' 'Tus-Resumable, Upload-Offset, Upload-Length, Upload-Metadata, Upload-Defer-Length, Upload-Concat, Upload-Checksum, Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain charset=UTF-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }

            # Add CORS headers to all other responses
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS, HEAD' always;
            add_header 'Access-Control-Allow-Headers' 'Tus-Resumable, Upload-Offset, Upload-Length, Upload-Metadata, Upload-Defer-Length, Upload-Concat, Upload-Checksum, Content-Type, Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Tus-Resumable, Tus-Version, Tus-Extension, Tus-Max-Size, Upload-Offset, Upload-Length, Upload-Metadata, Location, Content-Type' always;
        }
    }
}