events {
    worker_connections 1024;
}

http {
    # Ensure large uploads don't get blocked by Nginx size limits
    client_max_body_size 0;

    upstream terminusdb_backend {
        server ${TERMINUSDB_UPSTREAM};
    }

    server {
        listen 80;

        location / {
            # Disable buffering to allow streaming large files directly to TerminusDB
            proxy_request_buffering off;
            proxy_buffering off;
            
            # Forward necessary headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https; # Force HTTPS for downstream awareness

            # Proxy to TerminusDB; host:port from TERMINUSDB_UPSTREAM at container start (upstream block)
            proxy_pass http://terminusdb_backend;

            # --- LOCATION HEADER REWRITE ---
            # Rewrite HTTP redirects to HTTPS using your public Railway URL
            proxy_redirect ~^http://[^/]+/(.*)$ https://$host/$1;

            # --- CORS HEADERS ---
            # Apply CORS headers to ALL responses coming back from TerminusDB
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS, HEAD' always;
            add_header 'Access-Control-Allow-Headers' 'Tus-Resumable, Upload-Offset, Upload-Length, Upload-Metadata, Upload-Defer-Length, Upload-Concat, Upload-Checksum, Content-Type, Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Tus-Resumable, Tus-Version, Tus-Extension, Tus-Max-Size, Upload-Offset, Upload-Length, Upload-Metadata, Location, Content-Type' always;
        }
    }
}